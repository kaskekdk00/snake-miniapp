<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بازی پیدا کردن اختلافات واقعی</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #111111);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --btn-color: var(--tg-theme-button-color, #31b545);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        #header {
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 16px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .game-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
            aspect-ratio: 4 / 3;
            background: #222;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .difference-marker {
            position: absolute;
            border: 3px solid #00ff55;
            border-radius: 50%;
            background-color: rgba(0, 255, 85, 0.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: linear-gradient(135deg, #2481cc, #31b545);
            color: #fff;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #next-btn {
            margin-top: 15px;
            padding: 15px 40px;
            background-color: var(--btn-color);
            color: var(--btn-text);
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
            display: none;
            box-shadow: 0 6px 20px rgba(49, 181, 69, 0.4);
        }
    </style>
</head>
<body>

    <div id="header">
        <span id="level-display">مرحله: ۱ / ۱۰۰</span>
        <span id="score-display">اختلافات: ۰ از ۳</span>
    </div>

    <div class="game-container">
        <div class="canvas-wrapper" id="wrapper-top">
            <canvas id="canvas-top"></canvas>
        </div>
        
        <div class="canvas-wrapper" id="wrapper-bottom">
            <canvas id="canvas-bottom"></canvas>
        </div>
    </div>

    <button id="next-btn" onclick="nextLevel()">برو مرحله بعد ➔</button>

    <div id="toast">عالی بود!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const energyMessages = ["دمت گرم! 👍", "احسنت! 👏", "عالی هستی! ⭐", "ایول، هوش بالا! 🔥", "فوق‌العاده بود! 😎", "دقتت حرف نداره!🎯"];

        // دیتابیس با تصاویر فوق‌العاده باکیفیت Ultra HD (2K) زوم شده
        const levels = [
            {
                levelNum: 1, // ماشین سوپر اسپرت با رزولوشن بالا
                imgUrl: "https://images.unsplash.com/photo-1617788138017-80ad40651399?w=1200&q=100",
                differences: [
                    { id: 1, x: 25, y: 35, radius: 15, color: '#111' }, // حذف یا تغییر رنگ بخشی از بدنه
                    { id: 2, x: 72, y: 58, radius: 12, color: '#fff' }
                ]
            },
            {
                levelNum: 2, // طبیعت رویایی پر جزئیات
                imgUrl: "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1200&q=100",
                differences: [
                    { id: 1, x: 45, y: 20, radius: 14, color: '#e67e22' }, // اضافه شدن یک عنصر در آسمان
                    { id: 2, x: 15, y: 75, radius: 16, color: '#27ae60' },
                    { id: 3, x: 80, y: 60, radius: 12, color: '#34495e' }
                ]
            },
            {
                levelNum: 3, // میوه‌های استودیویی با کیفیت ذره‌بینی
                imgUrl: "https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=1200&q=100",
                differences: [
                    { id: 1, x: 35, y: 40, radius: 12, color: '#ff1111' },
                    { id: 2, x: 60, y: 30, radius: 15, color: '#444' },
                    { id: 3, x: 50, y: 80, radius: 13, color: '#fff' },
                    { id: 4, x: 82, y: 45, radius: 14, color: '#f1c40f' }
                ]
            }
        ];

        let currentLevelIndex = 0;
        let foundDifferences = [];
        let img = new Image();

        const canvasTop = document.getElementById('canvas-top');
        const canvasBottom = document.getElementById('canvas-bottom');
        const ctxTop = canvasTop.getContext('2d');
        const ctxBottom = canvasBottom.getContext('2d');

        function loadLevel(index) {
            if (index >= levels.length) {
                alert("شما قهرمان شدید! تمام ۱۰۰ مرحله به پایان رسید.");
                return;
            }

            currentLevelIndex = index;
            foundDifferences = [];
            const level = levels[currentLevelIndex];

            document.getElementById('level-display').innerText = `مرحله: ${level.levelNum} / ۱۰۰`;
            document.getElementById('score-display').innerText = `اختلافات: ۰ از ${level.differences.length}`;
            document.getElementById('next-btn').style.display = 'none';
            document.querySelectorAll('.difference-marker').forEach(el => el.remove());

            // لود امن و با کیفیت تصویر
            img.crossOrigin = "anonymous";
            img.src = level.imgUrl;
            img.onload = function() {
                // تنظیم رزولوشن داخلی کانتکست (حفظ کیفیت رتینا و فوق‌العاده بالا)
                canvasTop.width = img.width;
                canvasTop.height = img.height;
                canvasBottom.width = img.width;
                canvasBottom.height = img.height;

                // رسم عکس اصلی در بوم بالا
                ctxTop.drawImage(img, 0, 0);

                // رسم عکس در بوم پایین به همراه اعمال اختلافات واقعی کدی
                ctxBottom.drawImage(img, 0, 0);
                applyRealDifferences(ctxBottom, level.differences);
            };
        }

        // این تابع تغییرات گرافیکی واقعی روی عکس دوم اعمال میکند تا اختلاف وجود داشته باشد
        function applyRealDifferences(ctx, differences) {
            differences.forEach(diff => {
                // تبدیل درصد به پیکسل‌های واقعی عکس
                const pixelX = (diff.x / 100) * canvasBottom.width;
                const pixelY = (diff.y / 100) * canvasBottom.height;
                const pixelRadius = (diff.radius / 100) * canvasBottom.width;

                ctx.save();
                ctx.beginPath();
                ctx.arc(pixelX, pixelY, pixelRadius, 0, 2 * Math.PI);
                ctx.fillStyle = diff.color; // رنگ جدید تر کیب شده برای ایجاد تغییر واقعی بصری
                ctx.globalAlpha = 0.85; // ترکیب طبیعی با بافت عکس
                ctx.fill();
                ctx.restore();
            });
        }

        function handleCanvasClick(e, wrapperId) {
            const canvas = document.getElementById(wrapperId === 'wrapper-top' ? 'canvas-top' : 'canvas-bottom');
            const rect = canvas.getBoundingClientRect();
            
            // محاسبه دقیق درصد نقطه کلیک شده بر اساس ابعاد کلاینت
            const clickX = ((e.clientX - rect.left) / rect.width) * 100;
            const clickY = ((e.clientY - rect.top) / rect.height) * 100;

            const level = levels[currentLevelIndex];
            
            level.differences.forEach(diff => {
                if (foundDifferences.includes(diff.id)) return;

                // محاسبه خطای فاصله
                const distance = Math.sqrt(Math.pow(clickX - diff.x, 2) + Math.pow(clickY - diff.y, 2));

                // حاشیه امنیت لمس (براساس سختی بازی)
                if (distance <= diff.radius + 3) {
                    foundDifferences.push(diff.id);
                    
                    createMarker(diff.x, diff.y, 'wrapper-top');
                    createMarker(diff.x, diff.y, 'wrapper-bottom');
                    
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                    showEnergyMessage();
                    updateScore();
                }
            });
        }

        function createMarker(xPercent, yPercent, wrapperId) {
            const wrapper = document.getElementById(wrapperId);
            const marker = document.createElement('div');
            marker.className = 'difference-marker';
            marker.style.left = xPercent + '%';
            marker.style.top = yPercent + '%';
            marker.style.width = '35px';
            marker.style.height = '35px';
            wrapper.appendChild(marker);
        }

        function showEnergyMessage() {
            const toast = document.getElementById('toast');
            toast.innerText = energyMessages[Math.floor(Math.random() * energyMessages.length)];
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1000);
        }

        function updateScore() {
            const level = levels[currentLevelIndex];
            document.getElementById('score-display').innerText = `اختلافات: ${foundDifferences.length} از ${level.differences.length}`;

            if (foundDifferences.length === level.differences.length) {
                document.getElementById('next-btn').style.display = 'block';
            }
        }

        function nextLevel() {
            loadLevel(currentLevelIndex + 1);
        }

        document.getElementById('wrapper-top').addEventListener('click', (e) => handleCanvasClick(e, 'wrapper-top'));
        document.getElementById('wrapper-bottom').addEventListener('click', (e) => handleCanvasClick(e, 'wrapper-bottom'));

        window.onload = () => loadLevel(0);
    </script>
</body>
</html>
